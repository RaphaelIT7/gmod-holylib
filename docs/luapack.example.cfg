// Existing module; still disabled by default in HolyLib.
holylib_enable_gmoddatapack 1

// Conservative staging policy: do not publish unless server.cfg supplied sv_downloadurl.
holylib_gmoddatapack_luapack_downloadurl_policy require
holylib_gmoddatapack_luapack_packdir holylib/luapack
holylib_gmoddatapack_luapack_retention_ttl 300
holylib_gmoddatapack_luapack_ready_deadline 30

// Optional ingest is empty by default. Existing mirror/CDN pipelines can watch the data directory.
holylib_gmoddatapack_luapack_ingest_url ""
holylib_gmoddatapack_luapack_ingest_method PUT

// Enable only after the object is reachable at <sv_downloadurl>/data/holylib/luapack/.
holylib_gmoddatapack_luapack_enable 0

